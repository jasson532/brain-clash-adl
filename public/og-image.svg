<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#bf00ff"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00aa"/>
      <stop offset="100%" style="stop-color:#ffaa00"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow circles -->
  <circle cx="200" cy="315" r="200" fill="#00f5ff" opacity="0.05"/>
  <circle cx="1000" cy="315" r="200" fill="#bf00ff" opacity="0.05"/>
  <!-- Brain emoji -->
  <text x="600" y="200" font-size="100" text-anchor="middle" dominant-baseline="middle">🧠</text>
  <!-- BRAIN -->
  <text x="600" y="320" font-family="Arial Black, sans-serif" font-size="100" font-weight="900" text-anchor="middle" fill="url(#cyan)">BRAIN</text>
  <!-- CLASH -->
  <text x="600" y="430" font-family="Arial Black, sans-serif" font-size="100" font-weight="900" text-anchor="middle" fill="url(#pink)">CLASH</text>
  <!-- Subtitle -->
  <text x="600" y="510" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#a0a0cc">ADL Team Challenge — Torneo de Trivia por Equipos</text>
  <!-- Bottom accent line -->
  <rect x="400" y="560" width="400" height="3" fill="url(#cyan)" rx="2"/>
</svg>
